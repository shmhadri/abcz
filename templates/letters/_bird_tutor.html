<!-- Bird Tutor -->
{% if is_vip_user %}
    <section class="bird-tutor-card bird-lesson-shell" id="birdTutor" aria-label="Phonics Bird Tutor" data-lottie-status="fallback">
        <div class="bird-lesson-intro" id="birdLessonIntro">
            <div class="bird-intro-bubble" id="birdIntroBubble" aria-live="polite"></div>
            <div class="bird-intro-character" aria-hidden="true">
                <div id="birdIntroLottie" class="bird-lottie bird-intro-lottie"></div>
                <div id="birdIntroFallback" class="bird-fallback bird-intro-fallback">🦜</div>
            </div>
            <button type="button" class="bird-intro-continue" id="birdIntroContinue">المتابعة</button>
        </div>

        <div class="bird-lesson-main" id="birdLessonMain" hidden>
            <div class="bird-tutor-visual">
                <div id="birdLottie" class="bird-lottie" aria-hidden="true"></div>
                <div id="birdFallback" class="bird-fallback" aria-hidden="true">🦜</div>
            </div>
            <div class="bird-tutor-content">
                <div class="bird-tutor-name">Phonics Bird</div>
                {% if is_developer_vip_preview %}
                    <div class="developer-vip-preview-badge">Developer VIP Preview</div>
                {% endif %}
                <div id="birdStats" class="bird-stats" aria-live="polite"></div>
                <div id="birdBubble" class="bird-bubble" aria-live="polite"></div>
                <div id="birdHint" class="bird-hint" hidden></div>
                <div id="birdVisualQuestion" class="bird-visual-question" hidden></div>
                <div class="bird-controls">
                    <button type="button" class="bird-control-btn" id="birdAskBtn">🦜 اسألني</button>
                    <button type="button" class="bird-control-btn secondary" id="birdRepeatBtn">🔊 أعد قراءة السؤال</button>
                    <button type="button" class="bird-control-btn secondary bird-review-btn" id="birdReviewBtn" hidden>راجع أخطائي</button>
                </div>
                <div id="birdActions" class="bird-actions" aria-label="اختيارات العصفور"></div>
            </div>
        </div>
    </section>
{% else %}
    <section class="bird-tutor-card bird-tutor-locked" id="birdTutorLocked" aria-label="Phonics Bird Tutor VIP">
        <div class="bird-tutor-visual">
            <div class="bird-fallback locked" aria-hidden="true">🦜</div>
        </div>
        <div class="bird-tutor-content">
            <div class="bird-tutor-name">VIP Phonics Bird</div>
            <div class="bird-bubble">
                <strong>العصفور الذكي متاح في باقة VIP</strong>
                <span>يقرأ الأسئلة، يوجه الطفل، ويراجع الأخطاء خطوة بخطوة</span>
            </div>
            <a class="bird-upgrade-btn" href="/pricing/">ترقية إلى VIP</a>
        </div>
    </section>
{% endif %}
